<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>資金繰りダッシュボード</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #f4f1ea;
    font-family: Georgia, 'Hiragino Mincho ProN', serif;
    color: #2a2622;
    padding: 28px 20px 60px;
    max-width: 880px;
    margin: 0 auto;
  }
  input:focus, select:focus, button:focus {
    outline: 2px solid #8a7a63;
    outline-offset: 1px;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity: 0.4; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 8px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 34px; height: 34px; border-radius: 8px; background: #2a2622; color: #f4f1ea; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .eyebrow { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8a7a63; margin-bottom: 2px; }
  .title { font-size: 22px; font-weight: 600; margin: 0; line-height: 1.3; }
  .save-badge { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; color: #2f6b4f; transition: opacity 0.4s ease; white-space: nowrap; opacity: 0; }

  .hero { background: #2a2622; color: #f4f1ea; border-radius: 14px; padding: 26px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
  .hero-big { min-width: 240px; }
  .hero-label { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #b8ab93; margin-bottom: 6px; }
  .hero-number { font-size: 40px; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .hero-sub { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; color: #d8cfc0; margin-top: 8px; }
  .hero-stats { display: flex; gap: 28px; }
  .hero-stat { text-align: right; }
  .hero-stat-num { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .hero-stat-label { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; color: #b8ab93; margin-top: 2px; }

  .section { margin-bottom: 34px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; border-bottom: 1px solid #ddd4c4; padding-bottom: 10px; }
  .section-title { font-size: 15px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
  .ghost-btn { display: flex; align-items: center; gap: 6px; font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12.5px; font-weight: 600; background: transparent; border: 1px solid #c9bda6; border-radius: 7px; padding: 6px 11px; cursor: pointer; color: #2a2622; }

  .account-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .account-card { background: #fdfcf9; border: 1px solid #d8cdba; border-radius: 12px; padding: 16px 16px 14px; }
  .account-card.short { border-color: #e3b3ab; }
  .account-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 6px; }
  .account-name-input { font-family: Georgia, serif; font-size: 15.5px; font-weight: 600; border: none; background: transparent; padding: 2px 0; width: 100%; color: #2a2622; }
  .account-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .small-label { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12px; color: #8a7a63; }
  .yen-wrap { display: flex; align-items: center; gap: 2px; }
  .yen-prefix { font-size: 13px; color: #8a7a63; }
  .yen-input { font-family: Georgia, serif; font-size: 15px; font-weight: 600; border: none; border-bottom: 1px solid #d8cdba; background: transparent; width: 110px; padding: 2px; font-variant-numeric: tabular-nums; }
  .static-yen { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; color: #5c5346; }
  .divider { height: 1px; background: #e7dfd0; margin: 10px 0; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12.5px; font-weight: 700; padding: 5px 10px; border-radius: 999px; }
  .status-bad { background: #f4e0dc; color: #a13d2e; }
  .status-good { background: #e1ebe3; color: #2f6b4f; }
  .card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .card-chip { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; color: #6b6153; background: #efe9db; border-radius: 6px; padding: 3px 8px; }
  .empty-state { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; color: #8a7a63; padding: 18px 4px; text-align: center; grid-column: 1 / -1; }

  .plan-empty { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; color: #8a7a63; padding: 12px 2px; }
  .plan-list { display: flex; flex-direction: column; gap: 8px; }
  .plan-row { display: flex; align-items: center; gap: 12px; background: #fdfcf9; border: 1px solid #d8cdba; border-radius: 10px; padding: 12px 16px; flex-wrap: wrap; }
  .plan-step { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; color: #b8ab93; width: 20px; }
  .plan-from, .plan-to { font-size: 14.5px; font-weight: 600; flex: 1; min-width: 80px; }
  .plan-amount { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: #2a2622; min-width: 110px; text-align: right; }
  .plan-warning { display: flex; align-items: center; gap: 8px; font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12.5px; color: #a13d2e; background: #f4e0dc; border-radius: 8px; padding: 10px 14px; margin-top: 10px; }

  .table-wrap { background: #fdfcf9; border: 1px solid #d8cdba; border-radius: 12px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }
  th { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: #8a7a63; text-align: left; padding: 10px 14px; border-bottom: 1px solid #e7dfd0; background: #f4efe4; }
  tr { border-bottom: 1px solid #efe9db; }
  td { padding: 8px 14px; vertical-align: middle; }
  .table-input { font-family: Georgia, serif; font-size: 14px; border: none; background: transparent; width: 100%; padding: 4px 0; }
  .table-select { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; border: 1px solid #d8cdba; border-radius: 6px; background: #fff; padding: 5px 6px; max-width: 160px; }
  .day-wrap { display: flex; align-items: center; gap: 4px; }
  .day-input { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; border: 1px solid #d8cdba; border-radius: 6px; width: 48px; padding: 5px 6px; text-align: center; }
  .day-suffix { font-size: 12.5px; color: #8a7a63; }
  .icon-btn { background: transparent; border: none; color: #b58f83; cursor: pointer; padding: 4px; font-size: 15px; line-height: 1; }

  .footer { font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 12px; color: #a89a80; text-align: center; margin-top: 40px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">💰</div>
    <div>
      <div class="eyebrow">資金繰りダッシュボード</div>
      <h1 class="title">今月の引き落とし、足りてる？</h1>
    </div>
  </div>
  <div class="save-badge" id="saveBadge">保存しました</div>
</header>

<section class="hero">
  <div class="hero-big">
    <div class="hero-label">今月の不足合計</div>
    <div class="hero-number" id="heroNumber">¥0</div>
    <div class="hero-sub" id="heroSub"></div>
  </div>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num" id="statAccounts">0</div><div class="hero-stat-label">口座</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statCards">0</div><div class="hero-stat-label">カード</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statTotal">¥0</div><div class="hero-stat-label">引き落とし総額</div></div>
  </div>
</section>

<section class="section">
  <div class="section-head">
    <h2 class="section-title">🏦 口座別の状況</h2>
    <button class="ghost-btn" id="addAccountBtn">＋ 口座を追加</button>
  </div>
  <div class="account-grid" id="accountGrid"></div>
</section>

<section class="section">
  <div class="section-head"><h2 class="section-title">➡️ 振込プラン</h2></div>
  <div id="planArea"></div>
</section>

<section class="section">
  <div class="section-head">
    <h2 class="section-title">💳 クレジットカード（今月の引き落とし額）</h2>
    <button class="ghost-btn" id="addCardBtn">＋ カードを追加</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>カード名</th>
          <th>引き落とし口座</th>
          <th>引き落とし日</th>
          <th style="text-align:right;">今月の金額</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cardTableBody"></tbody>
    </table>
  </div>
</section>

<footer class="footer">毎月、各カードの確定額を入力すると自動で再計算されます。データはこのブラウザに保存されます（サーバーには送信されません）。</footer>

<script>
(function () {
  "use strict";

  var STORE_KEY = "kakei-state-v1";

  function loadState() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return null;
  }
  function saveState(state) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  var defaultAccounts = [
    { id: "acc1", name: "三菱UFJ銀行", balance: 150000 },
    { id: "acc2", name: "ゆうちょ銀行", balance: 80000 }
  ];
  var defaultCards = [
    { id: "card1", name: "楽天カード", accountId: "acc1", dueDay: 27, amount: 62000 },
    { id: "card2", name: "三井住友カード", accountId: "acc1", dueDay: 26, amount: 38000 },
    { id: "card3", name: "イオンカード", accountId: "acc2", dueDay: 2, amount: 15000 },
    { id: "card4", name: "PayPayカード", accountId: "acc2", dueDay: 27, amount: 21000 }
  ];

  var initial = loadState();
  var accounts = (initial && initial.accounts) || defaultAccounts;
  var cards = (initial && initial.cards) || defaultCards;

  function fmtYen(n) {
    var v = Math.round(n);
    return (v < 0 ? "\u2212" : "") + "\u00a5" + Math.abs(v).toLocaleString("ja-JP");
  }
  function uid(prefix) { return prefix + "_" + Math.random().toString(36).slice(2, 9); }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  var saveTimer = null;
  function persist() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      saveState({ accounts: accounts, cards: cards });
      var badge = document.getElementById("saveBadge");
      badge.style.opacity = "1";
      setTimeout(function () { badge.style.opacity = "0"; }, 900);
    }, 300);
  }

  function computeAccountNeeds() {
    var map = {};
    accounts.forEach(function (a) { map[a.id] = { needed: 0, cards: [] }; });
    cards.forEach(function (c) {
      if (!map[c.accountId]) return;
      map[c.accountId].needed += Number(c.amount) || 0;
      map[c.accountId].cards.push(c);
    });
    return map;
  }

  function computeRows() {
    var needs = computeAccountNeeds();
    var rows = accounts.map(function (a) {
      var need = (needs[a.id] && needs[a.id].needed) || 0;
      var shortfall = need - Number(a.balance);
      return {
        id: a.id, name: a.name, balance: a.balance,
        needed: need,
        shortfall: shortfall > 0 ? shortfall : 0,
        surplus: shortfall < 0 ? -shortfall : 0,
        cardsForAccount: (needs[a.id] && needs[a.id].cards) || []
      };
    });
    rows.sort(function (x, y) { return y.shortfall - x.shortfall; });
    return rows;
  }

  function computeTransferPlan(rows) {
    var givers = rows.filter(function (r) { return r.surplus > 0; })
      .map(function (r) { return { name: r.name, remaining: r.surplus }; });
    var takers = rows.filter(function (r) { return r.shortfall > 0; })
      .map(function (r) { return { name: r.name, remaining: r.shortfall }; });

    var plan = [];
    var gi = 0;
    takers.forEach(function (taker) {
      var need = taker.remaining;
      while (need > 0.5 && gi < givers.length) {
        var giver = givers[gi];
        if (giver.remaining <= 0.5) { gi++; continue; }
        var amt = Math.min(giver.remaining, need);
        plan.push({ from: giver.name, to: taker.name, amount: amt });
        giver.remaining -= amt;
        need -= amt;
        if (giver.remaining <= 0.5) gi++;
      }
    });

    var stillShort = takers.reduce(function (sum, t) {
      var used = plan.filter(function (p) { return p.to === t.name; })
        .reduce(function (s, p) { return s + p.amount; }, 0);
      var remain = t.remaining - used;
      return sum + (remain > 0.5 ? remain : 0);
    }, 0);

    return { plan: plan, stillShort: stillShort };
  }

  function updateAccount(id, patch) {
    accounts = accounts.map(function (a) { return a.id === id ? Object.assign({}, a, patch) : a; });
    persist();
    render();
  }
  function removeAccount(id) {
    var linked = cards.some(function (c) { return c.accountId === id; });
    if (linked) {
      if (!window.confirm("この口座に紐づくカードもあります。口座を削除するとカードの紐付けが外れます。続けますか？")) return;
      cards = cards.map(function (c) { return c.accountId === id ? Object.assign({}, c, { accountId: "" }) : c; });
    }
    accounts = accounts.filter(function (a) { return a.id !== id; });
    persist();
    render();
  }
  function addAccount() {
    accounts = accounts.concat([{ id: uid("acc"), name: "新しい口座", balance: 0 }]);
    persist();
    render();
  }

  function updateCard(id, patch) {
    cards = cards.map(function (c) { return c.id === id ? Object.assign({}, c, patch) : c; });
    persist();
    render();
  }
  function removeCard(id) {
    cards = cards.filter(function (c) { return c.id !== id; });
    persist();
    render();
  }
  function addCard() {
    cards = cards.concat([{ id: uid("card"), name: "新しいカード", accountId: (accounts[0] && accounts[0].id) || "", dueDay: 27, amount: 0 }]);
    persist();
    render();
  }

  function render() {
    var rows = computeRows();
    var totalShortfall = rows.reduce(function (s, r) { return s + r.shortfall; }, 0);
    var transferPlan = computeTransferPlan(rows);

    // hero
    var heroNumber = document.getElementById("heroNumber");
    heroNumber.textContent = fmtYen(totalShortfall);
    heroNumber.style.color = totalShortfall > 0 ? "#b23b2e" : "#2f6b4f";

    var heroSub = document.getElementById("heroSub");
    if (totalShortfall > 0) {
      heroSub.textContent = transferPlan.stillShort > 0.5
        ? "口座間の移動だけでは " + fmtYen(transferPlan.stillShort) + " 足りません"
        : "口座間の移動でまかなえます";
    } else {
      heroSub.textContent = "すべての口座で残高が足りています";
    }

    document.getElementById("statAccounts").textContent = accounts.length;
    document.getElementById("statCards").textContent = cards.length;
    document.getElementById("statTotal").textContent = fmtYen(cards.reduce(function (s, c) { return s + (Number(c.amount) || 0); }, 0));

    // account grid
    var grid = document.getElementById("accountGrid");
    if (rows.length === 0) {
      grid.innerHTML = '<div class="empty-state">口座がまだありません。「口座を追加」から登録してください。</div>';
    } else {
      grid.innerHTML = rows.map(function (r) {
        var chips = r.cardsForAccount.map(function (c) {
          return '<span class="card-chip">' + escapeHtml(c.name) + ' \u00b7 ' + fmtYen(c.amount) + '</span>';
        }).join("");
        var statusHtml = r.shortfall > 0
          ? '<div class="status-pill status-bad">\u26a0\ufe0f ' + fmtYen(r.shortfall) + ' 不足</div>'
          : '<div class="status-pill status-good">\u2705 ' + (r.surplus > 0 ? fmtYen(r.surplus) + ' 余裕あり' : 'ちょうど足りる') + '</div>';
        return (
          '<div class="account-card' + (r.shortfall > 0 ? ' short' : '') + '" data-id="' + r.id + '">' +
            '<div class="account-card-top">' +
              '<input class="account-name-input" data-role="acc-name" data-id="' + r.id + '" value="' + escapeHtml(r.name) + '" />' +
              '<button class="icon-btn" data-role="acc-remove" data-id="' + r.id + '" aria-label="口座を削除">\u2715</button>' +
            '</div>' +
            '<div class="account-row"><label class="small-label">現在残高</label>' +
              '<div class="yen-wrap"><span class="yen-prefix">\u00a5</span>' +
              '<input type="number" class="yen-input" data-role="acc-balance" data-id="' + r.id + '" value="' + r.balance + '" /></div>' +
            '</div>' +
            '<div class="account-row"><label class="small-label">引き落とし予定額</label>' +
              '<div class="static-yen">' + fmtYen(r.needed) + '</div>' +
            '</div>' +
            '<div class="divider"></div>' +
            statusHtml +
            (chips ? '<div class="card-chips">' + chips + '</div>' : '') +
          '</div>'
        );
      }).join("");
    }

    // plan area
    var planArea = document.getElementById("planArea");
    var html = "";
    if (transferPlan.plan.length === 0) {
      html += '<div class="plan-empty">' +
        (totalShortfall > 0 ? "口座間で移動できる余裕がありません。入金が必要です。" : "振込は不要です。すべての口座で足りています。") +
        '</div>';
    } else {
      html += '<div class="plan-list">' + transferPlan.plan.map(function (p, i) {
        return '<div class="plan-row">' +
          '<span class="plan-step">' + String(i + 1).padStart(2, "0") + '</span>' +
          '<span class="plan-from">' + escapeHtml(p.from) + '</span>' +
          '<span>\u2192</span>' +
          '<span class="plan-to">' + escapeHtml(p.to) + '</span>' +
          '<span class="plan-amount">' + fmtYen(p.amount) + '</span>' +
        '</div>';
      }).join("") + '</div>';
    }
    if (transferPlan.stillShort > 0.5) {
      html += '<div class="plan-warning">\u26a0\ufe0f 振込プランを実行しても、あと ' + fmtYen(transferPlan.stillShort) + ' が全体で不足しています。入金するか支出を見直してください。</div>';
    }
    planArea.innerHTML = html;

    // card table
    var tbody = document.getElementById("cardTableBody");
    if (cards.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">カードがまだありません。「カードを追加」から登録してください。</td></tr>';
    } else {
      tbody.innerHTML = cards.map(function (c) {
        var options = '<option value="">未設定</option>' + accounts.map(function (a) {
          return '<option value="' + a.id + '"' + (a.id === c.accountId ? ' selected' : '') + '>' + escapeHtml(a.name) + '</option>';
        }).join("");
        return (
          '<tr>' +
            '<td><input class="table-input" data-role="card-name" data-id="' + c.id + '" value="' + escapeHtml(c.name) + '" /></td>' +
            '<td><select class="table-select" data-role="card-account" data-id="' + c.id + '">' + options + '</select></td>' +
            '<td><div class="day-wrap"><input type="number" min="1" max="31" class="day-input" data-role="card-day" data-id="' + c.id + '" value="' + c.dueDay + '" /><span class="day-suffix">日</span></div></td>' +
            '<td style="text-align:right;"><div class="yen-wrap" style="justify-content:flex-end;"><span class="yen-prefix">\u00a5</span><input type="number" class="yen-input" style="text-align:right;" data-role="card-amount" data-id="' + c.id + '" value="' + c.amount + '" /></div></td>' +
            '<td style="width:36px;"><button class="icon-btn" data-role="card-remove" data-id="' + c.id + '" aria-label="カードを削除">\u2715</button></td>' +
          '</tr>'
        );
      }).join("");
    }

    bindEvents();
  }

  function bindEvents() {
    document.querySelectorAll('[data-role="acc-name"]').forEach(function (el) {
      el.oninput = function () { updateAccount(el.dataset.id, { name: el.value }); };
    });
    document.querySelectorAll('[data-role="acc-balance"]').forEach(function (el) {
      el.oninput = function () { updateAccount(el.dataset.id, { balance: el.value === "" ? 0 : Number(el.value) }); };
    });
    document.querySelectorAll('[data-role="acc-remove"]').forEach(function (el) {
      el.onclick = function () { removeAccount(el.dataset.id); };
    });
    document.querySelectorAll('[data-role="card-name"]').forEach(function (el) {
      el.oninput = function () { updateCard(el.dataset.id, { name: el.value }); };
    });
    document.querySelectorAll('[data-role="card-account"]').forEach(function (el) {
      el.onchange = function () { updateCard(el.dataset.id, { accountId: el.value }); };
    });
    document.querySelectorAll('[data-role="card-day"]').forEach(function (el) {
      el.oninput = function () { updateCard(el.dataset.id, { dueDay: el.value === "" ? "" : Number(el.value) }); };
    });
    document.querySelectorAll('[data-role="card-amount"]').forEach(function (el) {
      el.oninput = function () { updateCard(el.dataset.id, { amount: el.value === "" ? 0 : Number(el.value) }); };
    });
    document.querySelectorAll('[data-role="card-remove"]').forEach(function (el) {
      el.onclick = function () { removeCard(el.dataset.id); };
    });
  }

  document.getElementById("addAccountBtn").onclick = addAccount;
  document.getElementById("addCardBtn").onclick = addCard;

  render();
})();
</script>
</body>
</html>
